<script>
(function(){
  window.dataLayer=window.dataLayer||[];
  var _xhrOpen=XMLHttpRequest.prototype.open;
  var _xhrSend=XMLHttpRequest.prototype.send;
  var _purchasedOrderIds={};
  function pushEvent(url,method,data,body){
    try{
      if(!data||!data.success)return;
      // view_item
      if(url.indexOf('/api/product/get-by-slug/')!==-1){
        var p=data.data;
        if(p){
          var viItem={item_id:p._id,item_name:p.name||p.nameEn,item_category:p.category&&p.category.name,price:p.salePrice,currency:'BDT',quantity:1};
          window.dataLayer.push({ecommerce:null});
          window.dataLayer.push({event:'view_item',ecommerce:{currency:'BDT',value:p.salePrice||0,items:[viItem]}});
          window.dataLayer.push({event:'view_item_stape',ecommerce:{items:[viItem]}});
        }
      }
      // add_to_cart
      if(url.indexOf('/api/cart/add-to-cart')!==-1&&method==='POST'){
        var req={};try{req=JSON.parse(body);}catch(e){}
        var atcItem={item_id:req.product,quantity:req.selectedQty||1,currency:'BDT'};
        if(data.data&&data.data.product){
          var pr=data.data.product;
          atcItem.item_name=pr.name||pr.nameEn;
          atcItem.price=pr.salePrice||0;
          if(pr.category)atcItem.item_category=pr.category.name||pr.category;
        }
        var atcVal=(atcItem.price||0)*(atcItem.quantity||1);
        window.dataLayer.push({ecommerce:null});
        window.dataLayer.push({event:'add_to_cart',ecommerce:{currency:'BDT',value:atcVal,items:[atcItem]}});
        window.dataLayer.push({event:'add_to_cart_stape',ecommerce:{currency:'BDT',value:atcVal,items:[atcItem]}});
        window.dispatchEvent(new CustomEvent('amol-cart-added'));
      }
      // view_cart + begin_checkout
      if(url.indexOf('/api/cart/get-carts-by-user')!==-1&&data.data){
        var cartItems=(data.data||[]).filter(function(i){return i.product;}).map(function(i){return{item_id:i.product&&i.product._id||i.product,item_name:i.product&&i.product.name,price:i.product&&i.product.salePrice||0,quantity:i.selectedQty||1,currency:'BDT'};});
        if(cartItems.length>0){
          var cartVal=cartItems.reduce(function(s,i){return s+(i.price||0)*(i.quantity||1);},0);
          window.dataLayer.push({ecommerce:null});
          window.dataLayer.push({event:'view_cart',ecommerce:{currency:'BDT',value:cartVal,items:cartItems}});
          window.dataLayer.push({event:'view_cart_stape',ecommerce:{currency:'BDT',value:cartVal,items:cartItems}});
          if(window.location.href.indexOf('checkout')!==-1){
            window.dataLayer.push({ecommerce:null});
            window.dataLayer.push({event:'begin_checkout',ecommerce:{currency:'BDT',value:cartVal,items:cartItems}});
            window.dataLayer.push({event:'begin_checkout_stape',ecommerce:{currency:'BDT',value:cartVal,items:cartItems}});
          }
        }
      }
      // purchase — fires when order is placed (POST add-order)
      if((url.indexOf('/api/order/add-order-by-user')!==-1||url.indexOf('/api/order/add-order-by-ano')!==-1)&&method==='POST'){
        var order=data.data;
        if(order&&order._id&&!_purchasedOrderIds[order._id]){
          _purchasedOrderIds[order._id]=1;
          var purchaseItems=(order.orderedItems||[]).map(function(i){return{item_id:i._id,item_name:i.name,price:i.salePrice||0,quantity:i.quantity||1,currency:'BDT'};});
          window.dataLayer.push({ecommerce:null});
          window.dataLayer.push({event:'purchase',ecommerce:{transaction_id:order._id,value:order.grandTotal||0,currency:'BDT',items:purchaseItems}});
          window.dataLayer.push({event:'purchase_stape',ecommerce:{transaction_id:order._id,value:order.grandTotal||0,currency:'BDT',items:purchaseItems}});
        }
      }
      // purchase + page_view — fires on order-success page (GET order by orderId)
      if(url.indexOf('/api/order/get-order-by-order-id/')!==-1&&method==='GET'){
        var ord=data.data;
        if(ord&&ord._id&&!_purchasedOrderIds[ord._id]){
          _purchasedOrderIds[ord._id]=1;
          var ordItems=(ord.orderedItems||[]).map(function(i){return{item_id:i._id,item_name:i.name,price:i.salePrice||0,quantity:i.quantity||1,currency:'BDT'};});
          window.dataLayer.push({ecommerce:null});
          window.dataLayer.push({event:'purchase',ecommerce:{transaction_id:ord._id,value:ord.grandTotal||0,currency:'BDT',items:ordItems}});
          window.dataLayer.push({event:'purchase_stape',ecommerce:{transaction_id:ord._id,value:ord.grandTotal||0,currency:'BDT',items:ordItems}});
        }
        // Track order-success page view for SPA
        window.dataLayer.push({event:'page_view',page_path:window.location.pathname,page_title:'Order Success'});
      }
    }catch(e){}
  }
  XMLHttpRequest.prototype.open=function(m,u){this._gm=m;this._gu=u;return _xhrOpen.apply(this,arguments);};
  XMLHttpRequest.prototype.send=function(body){
    var self=this;
    self.addEventListener('load',function(){
      try{
        var data;try{data=JSON.parse(self.responseText);}catch(e){return;}
        pushEvent(self._gu||'',((self._gm||'').toUpperCase()),data,body);
      }catch(e){}
    });
    return _xhrSend.apply(this,arguments);
  };
  var _fetch=window.fetch;
  window.fetch=function(url,opts){
    return _fetch.apply(this,arguments).then(function(resp){
      var u=typeof url==='string'?url:(url&&url.url)||'';
      var m=opts&&opts.method?opts.method.toUpperCase():'GET';
      /* match both absolute (apisub.amolbooks.com/api/) and relative (/api/) URLs */
      if(u.indexOf('/api/')!==-1){
        resp.clone().json().then(function(data){pushEvent(u,m,data,opts&&opts.body);}).catch(function(){});
      }
      return resp;
    });
  };
})();
</script>
<script>
(function(){
  var _toastTimer=null;
  var _loopTimer=null;

  /* ── toast element (created once, lazily) ── */
  function getToast(){
    var t=document.getElementById('amol-cart-toast');
    if(!t){
      t=document.createElement('div');
      t.id='amol-cart-toast';
      t.innerHTML='<div class="amol-ct-msg">আপনার বই কার্টে যোগ হয়েছে।<br>অর্ডার সম্পন্ন করতে এখানে ক্লিক করুন</div>'
                 +'<button class="amol-ct-btn" onclick="window.location.href=\'/checkout\'">চেকআউট করুন &rarr;</button>';
      document.body.appendChild(t);
    }
    return t;
  }

  function showToast(){
    var t=getToast();
    clearTimeout(_toastTimer);
    t.classList.add('amol-show');
    _toastTimer=setTimeout(function(){t.classList.remove('amol-show');},6000);
  }

  /* ── loop animation helpers ── */
  function startCartLoop(){
    var icon=document.querySelector('.bottom-nav .fa-shopping-bag');
    if(!icon)return;
    icon.classList.remove('cart-icon-bounce','cart-icon-loop');
    void icon.offsetWidth;
    icon.classList.add('cart-icon-loop');
    clearTimeout(_loopTimer);
    /* auto-stop loop after 12 s so it doesn't run forever */
    _loopTimer=setTimeout(function(){
      if(icon)icon.classList.remove('cart-icon-loop');
    },12000);
  }

  function stopCartLoop(){
    var icon=document.querySelector('.bottom-nav .fa-shopping-bag');
    if(icon)icon.classList.remove('cart-icon-loop','cart-icon-bounce');
    clearTimeout(_loopTimer);
    /* also hide the toast */
    var t=document.getElementById('amol-cart-toast');
    if(t)t.classList.remove('amol-show');
    clearTimeout(_toastTimer);
  }

  function onCartAdded(){
    startCartLoop();
    showToast();
  }

  /* ── listen for API add-to-cart (logged-in users) ── */
  window.addEventListener('amol-cart-added',onCartAdded);

  /* ── setup badge observer + cart-button click stopper ── */
  function setup(){
    var nav=document.querySelector('.bottom-nav');
    if(!nav){setTimeout(setup,600);return;}

    /* stop loop & toast when user taps the cart footer button */
    nav.addEventListener('click',function(e){
      var li=e.target;
      while(li&&li!==nav){
        if(li.tagName==='LI'&&li.querySelector('.fa-shopping-bag')){
          stopCartLoop();
          break;
        }
        li=li.parentElement;
      }
    });

    /* MutationObserver for guest/localStorage cart badge changes.
       Grace period: Angular renders existing cart count on page load —
       we track those changes silently for ~1.5 s, then arm the trigger. */
    var lastCount=0;
    var armed=false;
    var existingSmall=nav.querySelector('small');
    if(existingSmall)lastCount=parseInt((existingSmall.textContent||'').trim())||0;
    setTimeout(function(){armed=true;},1500);

    function findSmall(mut){
      var t=mut.target;
      /* characterData — text node inside <small> changed */
      if(t.tagName==='SMALL')return t;
      if(t.parentElement&&t.parentElement.tagName==='SMALL')return t.parentElement;
      /* childList — <small> element was added (first item ever added to cart) */
      if(mut.type==='childList'){
        for(var j=0;j<mut.addedNodes.length;j++){
          var node=mut.addedNodes[j];
          if(node.tagName==='SMALL')return node;
          if(node.nodeType===1&&node.querySelector){var s=node.querySelector('small');if(s)return s;}

      }
      return null;
    }

    var obs=new MutationObserver(function(mutations){
      for(var i=0;i<mutations.length;i++){
        var small=findSmall(mutations[i]);
        if(small){
          var n=parseInt((small.textContent||'').trim())||0;
          if(armed&&n>lastCount){onCartAdded();}
          lastCount=n;
          break;
        }
      }
    });
    obs.observe(nav,{subtree:true,childList:true,characterData:true});
  }

  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',setup);}
  else{setup();}
})();

<script>
/* Global image-error fallback — covers NgOptimizedImage (ngSrc) which has
   no built-in error handler, as well as any other broken product images.
   Runs in capture phase so it fires before Angular's own listeners. */
(function(){
  var PLACEHOLDER='/assets/images/placeholder/test.png';
  document.addEventListener('error',function(e){
    var img=e.target;
    if(img.tagName!=='IMG')return;
    if(img._amolFallback)return;          /* already applied — stop loop */
    if(img.src&&img.src.indexOf(PLACEHOLDER)!==-1)return; /* already placeholder */
    img._amolFallback=true;
    img.removeAttribute('srcset');        /* clear srcset variants */
    img.removeAttribute('sizes');
    img.src=PLACEHOLDER;
  },true);
})();
</script>
