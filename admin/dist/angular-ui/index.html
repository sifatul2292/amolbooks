<style>
  #co-fab{position:fixed;bottom:24px;left:16px;z-index:99999;display:flex;align-items:center;gap:8px;background:#6c3fc5;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;font-family:'Nunito Sans','Segoe UI',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(108,63,197,.45);text-decoration:none;letter-spacing:.01em;transition:background .15s,transform .1s;}
  #co-fab:hover{background:#5530a0;transform:translateY(-1px);}
  #co-fab i{font-size:15px;}
</style>
<script>
(function() {
  // ── Floating button (always visible) ──────────────────────────────────────
  function addFloatingButton() {
    if (document.getElementById('co-fab')) return;
    var btn = document.createElement('a');
    btn.id = 'co-fab';
    btn.href = '/upload/static/custom-orders.html';
    btn.target = '_blank';
    btn.innerHTML = '<i class="fas fa-list-alt"></i> Custom Orders';
    document.body.appendChild(btn);
  }

  // ── Sidebar injection (mat-nav-list / mat-list-item) ──────────────────────
  var INJECTED_ID = 'co-sidebar-item';

  function findOrderListItem() {
    // Try mat-list-item first, then anchors, then any clickable
    var candidates = document.querySelectorAll('mat-list-item, a[routerlink], a[ng-reflect-router-link], .mat-list-item');
    for (var i = 0; i < candidates.length; i++) {
      var t = (candidates[i].textContent || '').trim();
      if (/order\s*list|order\s*লিস্ট|অর্ডার/i.test(t) && t.length < 80) {
        return candidates[i];
      }
    }
    return null;
  }

  function buildSidebarLink(ref) {
    var el = ref.cloneNode(true);
    el.id = INJECTED_ID;
    el.removeAttribute('routerlink');
    el.removeAttribute('routerlinkactive');
    el.removeAttribute('ng-reflect-router-link');
    el.removeAttribute('ng-reflect-router-link-active');
    // Make it a real anchor
    if (el.tagName !== 'A') {
      var wrap = document.createElement('a');
      wrap.id = INJECTED_ID;
      wrap.href = '/upload/static/custom-orders.html';
      wrap.target = '_blank';
      wrap.style.cssText = ref.style.cssText || '';
      wrap.className = el.className;
      wrap.innerHTML = el.innerHTML;
      el = wrap;
    } else {
      el.href = '/upload/static/custom-orders.html';
      el.target = '_blank';
    }
    // Replace text label
    var textNodes = [];
    var walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
    var n;
    while ((n = walker.nextNode())) { if (n.textContent.trim()) textNodes.push(n); }
    if (textNodes.length) textNodes[textNodes.length - 1].textContent = ' Custom Orders';
    // Replace icon
    var icon = el.querySelector('i[class*="fa-"], mat-icon');
    if (icon) {
      if (icon.tagName === 'I') icon.className = icon.className.replace(/fa-\S+/g, 'fa-list-alt');
      else icon.textContent = 'list_alt';
    }
    return el;
  }

  function injectSidebar() {
    if (document.getElementById(INJECTED_ID)) return;
    var ref = findOrderListItem();
    if (!ref) return;
    var link = buildSidebarLink(ref);
    ref.parentNode.insertBefore(link, ref.nextSibling);
  }

  // ── Bootstrap ─────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', addFloatingButton);

  var obs = new MutationObserver(function() {
    addFloatingButton();
    injectSidebar();
  });
  obs.observe(document.body, { childList: true, subtree: true });

  setTimeout(function() { addFloatingButton(); injectSidebar(); }, 1500);
  setTimeout(function() { addFloatingButton(); injectSidebar(); }, 3500);
})();
</script>
