<script>
(function injectCustomOrdersLink() {
  var INJECTED_ID = 'custom-orders-nav-link';
  var TARGET_TEXTS = ['Order List', 'order list', 'অর্ডার লিস্ট'];

  function findOrderListItem() {
    var all = document.querySelectorAll('a, mat-list-item, [role="listitem"], li');
    for (var i = 0; i < all.length; i++) {
      var el = all[i];
      var text = el.textContent || '';
      for (var t = 0; t < TARGET_TEXTS.length; t++) {
        if (text.trim().indexOf(TARGET_TEXTS[t]) !== -1) {
          return el;
        }
      }
    }
    return null;
  }

  function buildLink(referenceEl) {
    var clone = referenceEl.cloneNode(true);
    clone.id = INJECTED_ID;

    // Update href/routerLink to point to the custom orders page
    clone.removeAttribute('ng-reflect-router-link');
    clone.removeAttribute('routerlink');
    clone.href = '/upload/static/custom-orders.html';
    clone.target = '_blank';
    clone.removeAttribute('routerLinkActive');
    clone.removeAttribute('ng-reflect-router-link-active');
    clone.classList.remove('active-link', 'ng-star-inserted');

    // Update text — find the text node or span that holds the label
    var spans = clone.querySelectorAll('span, .nav-text, .menu-title');
    var replaced = false;
    spans.forEach(function(span) {
      if (span.textContent.trim().indexOf('Order') !== -1 || span.textContent.trim().indexOf('অর্ডার') !== -1) {
        span.textContent = 'Custom Orders';
        replaced = true;
      }
    });
    if (!replaced) {
      // fallback: replace last text node
      var walker = document.createTreeWalker(clone, NodeFilter.SHOW_TEXT);
      var node, last;
      while ((node = walker.nextNode())) last = node;
      if (last && last.textContent.trim()) last.textContent = ' Custom Orders';
    }

    // Update icon if font-awesome is used
    var icon = clone.querySelector('i[class*="fa-"]');
    if (icon) {
      icon.className = icon.className.replace(/fa-\S+/, 'fa-list-alt');
    }

    return clone;
  }

  function inject() {
    if (document.getElementById(INJECTED_ID)) return;
    var ref = findOrderListItem();
    if (!ref) return;
    var link = buildLink(ref);
    ref.parentNode.insertBefore(link, ref.nextSibling);
  }

  var observer = new MutationObserver(function() {
    if (!document.getElementById(INJECTED_ID)) inject();
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // Also try on load
  window.addEventListener('load', inject);
  setTimeout(inject, 2000);
  setTimeout(inject, 4000);
})();
</script>
